name: Lint & Format

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run oxlint
        run: npx oxlint --react-plugin .

  oxfmt:
    name: oxfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check formatting
        run: npx oxfmt --check src
